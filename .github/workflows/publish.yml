name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ci-and-publish:
    name: CI & Dual Registry Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Instalar Dependências
        run: npm ci

      - name: Verificar Formatação (Prettier)
        run: npm run format:check

      - name: Code Quality (Linter)
        run: npm run lint

      - name: Garantia de Qualidade (Testes)
        run: npm test -- --run

      - name: Compilação (Build Artifacts)
        run: npm run build

      # OIDC Trusted Publishing exige npm >= 11.5.1
      - name: Atualizar npm (OIDC Trusted Publishing)
        run: npm install -g npm@latest

      # Autenticação via OIDC Trusted Publishing (sem token).
      # Requer Trusted Publisher configurado no npmjs.com apontando para publish.yml
      - name: Deploy para NPMJS
        run: npm publish --access public --ignore-scripts --loglevel=http

      - name: Setup Auth para GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@raicampos"

      - name: Deploy para GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
