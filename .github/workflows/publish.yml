name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ci-and-publish:
    name: CI & Dual Registry Publish
    runs-on: ubuntu-latest
    # Environment exigido pelo Trusted Publisher configurado no npmjs
    environment: NPM_TOKEN
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Instalar Dependências
        run: npm ci

      - name: Verificar Formatação (Prettier)
        run: npm run format:check

      - name: Code Quality (Linter)
        run: npm run lint

      - name: Garantia de Qualidade (Testes)
        run: npm test -- --run

      - name: Compilação (Build Artifacts)
        run: npm run build

      # OIDC Trusted Publishing exige npm >= 11.5.1 (node 20 traz npm 10)
      - name: Atualizar npm (OIDC Trusted Publishing)
        run: npm install -g npm@latest

      - name: Debug ambiente OIDC
        run: |
          echo "npm: $(npm --version)"
          echo "node: $(node --version)"
          echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG"
          echo "--- .npmrc efetivo ---"
          npm config get userconfig
          cat "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" 2>/dev/null | sed -E 's/(_authToken=).*/\1REDACTED/' || echo "(sem userconfig .npmrc)"
          echo "--- OIDC vars ---"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set? ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"

      # NAO usar setup-node/registry-url aqui: ele grava _authToken placeholder
      # no .npmrc, e o npm tenta auth por token (invalido) em vez de OIDC.
      # Registry default ja e o npmjs (ver publishConfig no package.json).
      - name: Deploy para NPMJS (com Provenance)
        run: npm publish --access public --provenance --ignore-scripts --loglevel=http

      - name: Setup Auth para GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@raicampos"

      - name: Deploy para GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com --ignore-scripts
